spring.application.name=florgest-backend

# Configuración de Base de Datos PostgreSQL
# Por favor, asegúrate de crear la base de datos 'florgest_db' en tu servidor PostgreSQL
# y actualiza el usuario y contraseña según tu configuración local.
spring.datasource.url=jdbc:postgresql://localhost:5432/florgest_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Puerto del servidor
server.port=8080
