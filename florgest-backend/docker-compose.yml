version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: florgest_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: florgest_db
    ports:
      - "5433:5432"
    volumes:
      - florgest_pgdata:/var/lib/postgresql/data

volumes:
  florgest_pgdata:
